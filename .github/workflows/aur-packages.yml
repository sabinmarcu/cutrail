name: aur-packages

on:
  workflow_run:
    workflows:
      - release
    types:
      - completed
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: aur-packages-${{ github.event_name }}-${{ github.event.workflow_run.id || github.sha }}
  cancel-in-progress: false

jobs:
  publish-release-packages:
    if: github.event_name == 'workflow_run' && github.event.workflow_run.conclusion == 'success'
    runs-on: ubuntu-latest
    steps:
      - name: Check AUR credentials
        id: auth
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets['AUR_SSH_PRIVATE_KEY'] }}
        run: |
          set -euo pipefail
          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "AUR credentials are not configured; skipping AUR publish steps."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.auth.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Resolve stable release tag from workflow commit
        if: steps.auth.outputs.enabled == 'true'
        id: tag
        shell: bash
        env:
          HEAD_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          if [[ -z "${HEAD_SHA}" ]]; then
            echo "Missing workflow_run head SHA."
            exit 1
          fi

          release_tag="$(git tag --points-at "${HEAD_SHA}" | grep -E '^v[0-9]+\.[0-9]+\.[0-9]+$' | sort -V | tail -n1 || true)"
          if [[ -z "${release_tag}" ]]; then
            echo "No stable SemVer tag found for workflow_run SHA: ${HEAD_SHA}"
            exit 1
          fi

          echo "release_tag=${release_tag}" >> "${GITHUB_OUTPUT}"

      - name: Validate release assets exist
        if: steps.auth.outputs.enabled == 'true'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"
          required_appimage="Cutrail-${version}.AppImage"

          if ! gh release view "${RELEASE_TAG}" --repo "${GITHUB_REPOSITORY}" --json assets --jq '.assets[].name' | grep -Fx "${required_appimage}" >/dev/null; then
            echo "Missing required release asset: ${required_appimage}"
            exit 1
          fi

      - name: Prepare SSH credentials
        if: steps.auth.outputs.enabled == 'true'
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets['AUR_SSH_PRIVATE_KEY'] }}
          AUR_KNOWN_HOSTS: ${{ secrets['AUR_KNOWN_HOSTS'] }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [[ -n "$AUR_KNOWN_HOSTS" ]]; then
            printf '%s\n' "$AUR_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan aur.archlinux.org > ~/.ssh/known_hosts
          fi

      - name: Publish release packages
        if: steps.auth.outputs.enabled == 'true'
        shell: bash
        env:
          RELEASE_TAG: ${{ steps.tag.outputs.release_tag }}
        run: |
          set -euo pipefail

          version="${RELEASE_TAG#v}"
          packages=(cutrail cutrail-bin)

          for package in "${packages[@]}"; do
            workdir="/tmp/${package}-aur"
            rm -rf "$workdir"
            git clone "ssh://aur@aur.archlinux.org/${package}.git" "$workdir"
            cp -R "packaging/aur/${package}/PKGBUILD" "$workdir/PKGBUILD"
            cp -R "packaging/aur/${package}/.SRCINFO" "$workdir/.SRCINFO"
            sed -i -E "s/^pkgver=.*/pkgver=${version}/" "$workdir/PKGBUILD"
            sed -i -E "s/^\tpkgver = .*/\tpkgver = ${version}/" "$workdir/.SRCINFO"

            if [[ "$package" == "cutrail" ]]; then
              sed -i -E "s|^\tsource = .*|\tsource = cutrail-${version}.tar.gz::https://github.com/sabinmarcu/cutrail/archive/refs/tags/v${version}.tar.gz|" "$workdir/.SRCINFO"
            else
              sed -i -E "s|^\tsource_x86_64 = .*|\tsource_x86_64 = cutrail-${version}.AppImage::https://github.com/sabinmarcu/cutrail/releases/download/v${version}/Cutrail-${version}.AppImage|" "$workdir/.SRCINFO"
            fi

            cd "$workdir"
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add PKGBUILD .SRCINFO
            if git diff --cached --quiet; then
              echo "No changes to publish for ${package}."
              continue
            fi
            git commit -m "Update ${package} for ${version}"
            git push origin HEAD:master
          done

  publish-git-package:
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Check AUR credentials
        id: auth
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets['AUR_SSH_PRIVATE_KEY'] }}
        run: |
          set -euo pipefail
          if [[ -z "$AUR_SSH_PRIVATE_KEY" ]]; then
            echo "AUR credentials are not configured; skipping AUR publish steps."
            echo "enabled=false" >> "${GITHUB_OUTPUT}"
            exit 0
          fi
          echo "enabled=true" >> "${GITHUB_OUTPUT}"

      - name: Checkout
        if: steps.auth.outputs.enabled == 'true'
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Compute rolling version
        if: steps.auth.outputs.enabled == 'true'
        id: version
        shell: bash
        run: |
          set -euo pipefail
          version=$(git describe --tags --long --always --abbrev=7 | sed 's/^v//' | sed 's/-/./g')
          echo "version=${version}" >> "$GITHUB_OUTPUT"

      - name: Prepare SSH credentials
        if: steps.auth.outputs.enabled == 'true'
        shell: bash
        env:
          AUR_SSH_PRIVATE_KEY: ${{ secrets['AUR_SSH_PRIVATE_KEY'] }}
          AUR_KNOWN_HOSTS: ${{ secrets['AUR_KNOWN_HOSTS'] }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          printf '%s\n' "$AUR_SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          if [[ -n "$AUR_KNOWN_HOSTS" ]]; then
            printf '%s\n' "$AUR_KNOWN_HOSTS" > ~/.ssh/known_hosts
          else
            ssh-keyscan aur.archlinux.org > ~/.ssh/known_hosts
          fi

      - name: Publish rolling package
        if: steps.auth.outputs.enabled == 'true'
        shell: bash
        run: |
          set -euo pipefail

          version="${{ steps.version.outputs.version }}"
          workdir="/tmp/cutrail-git-aur"

          rm -rf "$workdir"
          git clone "ssh://aur@aur.archlinux.org/cutrail-git.git" "$workdir"
          cp -R "packaging/aur/cutrail-git/PKGBUILD" "$workdir/PKGBUILD"
          cp -R "packaging/aur/cutrail-git/.SRCINFO" "$workdir/.SRCINFO"
          sed -i -E "s/^pkgver=.*/pkgver=${version}/" "$workdir/PKGBUILD"
          sed -i -E "s/^\tpkgver = .*/\tpkgver = ${version}/" "$workdir/.SRCINFO"

          cd "$workdir"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add PKGBUILD .SRCINFO
          if git diff --cached --quiet; then
            echo "No changes to publish for cutrail-git."
            exit 0
          fi
          git commit -m "Update cutrail-git for ${version}"
          git push origin HEAD:master
