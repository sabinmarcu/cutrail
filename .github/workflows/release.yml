name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  verify-release-context:
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup proto toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Verify tag version matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: proto run node -- scripts/check-tag-version.mjs

      - name: Verify GitHub Release exists for tag
        run: gh release view "${TAG_NAME}" --repo "${GITHUB_REPOSITORY}"

  build-release-assets:
    needs: verify-release-context
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup proto toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: proto run yarn -- install --immutable

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Build Linux release assets (AppImage, deb, rpm)
        if: runner.os == 'Linux'
        run: proto run yarn -- build && proto run yarn -- electron-builder --linux AppImage deb rpm --publish never

      - name: Ensure canonical AppImage name for AUR
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          canonical="dist/Cutrail-${version}.AppImage"
          first_appimage=$(ls dist/*.AppImage | head -n1)
          if [[ "${first_appimage}" != "${canonical}" ]]; then
            cp "${first_appimage}" "${canonical}"
          fi

      - name: Build macOS release assets (dmg)
        if: runner.os == 'macOS'
        run: proto run yarn -- build && proto run yarn -- electron-builder --mac dmg --publish never

      - name: Build Windows release assets (exe)
        if: runner.os == 'Windows'
        run: proto run yarn -- build && proto run yarn -- electron-builder --win nsis --publish never

      - name: Upload Linux release assets
        if: runner.os == 'Linux'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-linux
          if-no-files-found: error
          path: |
            dist/*.AppImage
            dist/*.deb
            dist/*.rpm
            dist/latest-linux.yml

      - name: Upload macOS release assets
        if: runner.os == 'macOS'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-macos
          if-no-files-found: error
          path: |
            dist/*.dmg
            dist/*.dmg.blockmap
            dist/latest-mac.yml

      - name: Upload Windows release assets
        if: runner.os == 'Windows'
        uses: actions/upload-artifact@v4
        with:
          name: release-assets-windows
          if-no-files-found: error
          path: |
            dist/*.exe
            dist/*.exe.blockmap
            dist/latest.yml

  publish-release:
    needs: build-release-assets
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      TAG_NAME: ${{ github.ref_name }}
    steps:
      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: Upload assets to release
        shell: bash
        run: |
          mapfile -d '' files < <(find release-assets -type f -print0)
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No release assets found to upload."
            exit 1
          fi

          gh release upload "${TAG_NAME}" "${files[@]}" --clobber --repo "${GITHUB_REPOSITORY}"
