name: release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref_name }}
  cancel-in-progress: false

jobs:
  prepare-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup proto toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Verify tag version matches package version
        env:
          TAG_NAME: ${{ github.ref_name }}
        run: proto run node -- scripts/check-tag-version.mjs

      - name: Delete existing release for tag if present
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const tag = context.ref.replace('refs/tags/', '');

            try {
              const release = await github.rest.repos.getReleaseByTag({
                owner,
                repo,
                tag,
              });

              await github.rest.repos.deleteRelease({
                owner,
                repo,
                release_id: release.data.id,
              });

              core.info(`Deleted existing release for ${tag}`);
            } catch (error) {
              if (error.status === 404) {
                core.info(`No existing release found for ${tag}`);
              } else {
                throw error;
              }
            }

  build-release-assets:
    needs: prepare-release
    runs-on: ${{ matrix.os }}
    env:
      GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
          - windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup proto toolchain
        uses: moonrepo/setup-toolchain@v0
        with:
          auto-install: true

      - name: Install dependencies
        run: proto run yarn -- install --immutable

      - name: Install Linux packaging dependencies
        if: runner.os == 'Linux'
        run: sudo apt-get update && sudo apt-get install -y rpm fakeroot

      - name: Build Linux release assets (AppImage, deb, rpm)
        if: runner.os == 'Linux'
        run: proto run yarn -- build && proto run yarn -- electron-builder --linux AppImage deb rpm

      - name: Ensure canonical AppImage name for AUR
        if: runner.os == 'Linux'
        shell: bash
        run: |
          version=$(node -p "require('./package.json').version")
          canonical="dist/Cutrail-${version}.AppImage"
          first_appimage=$(ls dist/*.AppImage | head -n1)
          if [[ "${first_appimage}" != "${canonical}" ]]; then
            cp "${first_appimage}" "${canonical}"
          fi

      - name: Build macOS release assets (dmg)
        if: runner.os == 'macOS'
        run: proto run yarn -- build && proto run yarn -- electron-builder --mac dmg

      - name: Build Windows release assets (exe)
        if: runner.os == 'Windows'
        run: proto run yarn -- build && proto run yarn -- electron-builder --win nsis

