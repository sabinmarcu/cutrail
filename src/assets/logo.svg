<svg width="512" height="512" viewBox="0 0 512 512" xmlns="http://www.w3.org/2000/svg">
  <!-- Background (transparent square boundary) -->
  <rect x="32" y="32" width="448" height="448" rx="72" fill="none" stroke="#000" stroke-width="12"/>

  <!-- Clip card -->
  <rect x="144" y="136" width="224" height="176" rx="24" fill="none" stroke="#000" stroke-width="12"/>

  <!-- Cut corner -->
  <polygon points="344,136 368,160 368,248 344,248" fill="none"/>
  <line x1="344" y1="136" x2="368" y2="160" stroke="#000" stroke-width="10" stroke-linecap="round"/>

  <!-- Clip holes -->
  <circle cx="176" cy="168" r="10" fill="#000"/>
  <circle cx="208" cy="168" r="10" fill="#000"/>

  <!-- Inner content bar -->
  <rect x="176" y="208" width="160" height="40" rx="10" fill="none" stroke="#000" stroke-width="8"/>
  <rect x="184" y="216" width="72" height="24" rx="6" fill="#000"/>
  <rect x="264" y="216" width="64" height="24" rx="6" fill="#000"/>

  <!-- Rail hint below -->
  <line x1="128" y1="336" x2="384" y2="336" stroke="#000" stroke-width="12" stroke-linecap="round"/>
  <line x1="176" y1="324" x2="176" y2="348" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <line x1="256" y1="324" x2="256" y2="348" stroke="#000" stroke-width="8" stroke-linecap="round"/>
  <line x1="336" y1="324" x2="336" y2="348" stroke="#000" stroke-width="8" stroke-linecap="round"/>

  <!-- Accent dot (now monochrome) -->
  <circle cx="256" cy="288" r="6" fill="#000"/>
</svg>